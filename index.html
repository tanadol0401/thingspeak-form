<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background: #181b1f;
      color: white;
      font-family: sans-serif;
      padding: 16px;
    }
    label { display: block; margin-top: 12px; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px;
      background: #2c2f35;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    #status { margin-top: 12px; color: #73bf69; }
  </style>
</head>
<body>

  <label>Temperature (°C)</label>
  <input type="number" id="field1" placeholder="กรอกอุณหภูมิ">

  <label>Humidity (%)</label>
  <input type="number" id="field2" placeholder="กรอกความชื้น">

  <button onclick="sendData()">📤 Submit</button>
  <div id="status"></div>

<script>
function sendData() {
  const key = "YOUR_WRITE_API_KEY"; // ← ใส่ key ของคุณตรงนี้
  const f1 = document.getElementById("field1").value;
  const f2 = document.getElementById("field2").value;

  document.getElementById("status").innerText = "กำลังส่ง...";

  fetch(`https://api.thingspeak.com/update?api_key=${key}&field1=${f1}&field2=${f2}`)
    .then(r => r.text())
    .then(res => {
      if (res === "0") {
        document.getElementById("status").innerText = "❌ ส่งไม่สำเร็จ (รอ 15 วิแล้วลองใหม่)";
      } else {
        document.getElementById("status").innerText = "✅ ส่งสำเร็จ! Entry: " + res;
      }
    })
    .catch(e => {
      document.getElementById("status").innerText = "❌ Error: " + e;
    });
}
</script>
</body>
</html>
